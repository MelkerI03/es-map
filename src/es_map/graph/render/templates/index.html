<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Network Graph</title>
  <script src="d3.v7.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    svg {
      width: 100vw;
      height: 100vh;
    }

    .node {
      stroke: #333;
      stroke-width: 1px;
    }

    .host {
      fill: #66b2ff;
    }

    .router {
      fill: #ffcc66;
    }

    .edge {
      stroke: #555;
      stroke-width: 1.5px;
    }

    .subnet {
      fill: lightblue;
      opacity: 0.2;
      stroke: #3399ff;
      stroke-width: 2px;
    }

    /* Sidebar */
    #sidebar {
      position: fixed;
      top: 0;
      left: -300px;
      width: 300px;
      height: 100%;

      background: #f4f4f4;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);

      padding: 20px;
      transition: left 0.3s ease;

      z-index: 999;
    }

    /* Open state */
    #sidebar.open {
      left: 0;
    }

    /* Button (the handle) */
    #settings-btn {
      position: absolute;
      top: 20px;
      right: -40px;
      width: 40px;
      height: 40px;
      border: none;
      background: #f4f4f4;
      cursor: pointer;
      /*border-radius: 0 5px 5px 0;*/
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>
  <!-- Settings button -->

  <!-- Sidebar -->
  <div id="sidebar">
    <button id="settings-btn">
      <img src="./icons/cog.svg" width="25" height="25" />
    </button>

    <h2>Settings</h2>
    <p>Coming soon...</p>
  </div>

  <svg id="graph"></svg>
  <script type="module" src="graph.js"></script>

</body>

</html>
