name: Build Windows wheel bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        run: pip install uv

      - name: Export requirements
        run: |
          uv export --format=requirements.txt -o requirements.txt

      - name: Create wheel directory
        run: mkdir wheels

      - name: Download dependency wheels
        run: |
          pip download -r requirements.txt -d wheels --only-binary=:all:

      - name: Build project wheel
        run: uv build

      - name: Copy project wheel into bundle
        run: copy dist\*.whl wheels\

      - name: Zip wheel bundle
        run: powershell Compress-Archive wheels wheels.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-wheel-bundle
          path: wheels.zip
